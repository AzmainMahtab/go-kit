# Development overrides. Docker Compose merges this file automatically.
# It enables hot reload by mounting the local source into the container.
name: go-kit

services:
  api:
    build:
      target: development
    environment:
      ENVIRONMENT: development
    volumes:
      - .:/app
      - go_mod_cache:/go/pkg/mod
    command: ["air", "-c", ".air.toml"]

volumes:
  go_mod_cache:
